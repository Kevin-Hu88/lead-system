databases:
  - name: lead-system-db
    plan: free
    databaseName: lead_system
    user: lead_user

services:
  - type: web
    name: lead-system
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lead-system-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0